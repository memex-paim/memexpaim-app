<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memex LLM</title>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    reg.addEventListener('updatefound', () => {
      const sw = reg.installing;
      sw.addEventListener('statechange', () => {
        if (sw.state === 'installed' && navigator.serviceWorker.controller) {
          document.getElementById('update-badge').style.display = 'inline';
        }
      });
    });
    setInterval(() => reg.update(), 60 * 60 * 1000);
  }).catch(() => {});
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    document.getElementById('update-badge').style.display = 'inline';
  });
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible')
      navigator.serviceWorker.getRegistration().then(r => r && r.update());
  });
}
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1a;
    --bg2: #1a1a1a;
    --bg3: #222222;
    --text: #e8e8e8;
    --text2: #888888;
    --text3: #505050;
    --border: #2a2a2a;
    --input-border: #272727;
    --accent: #4f8ef7;
    --sidebar-w: 220px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg2);
    border-right: none;
    display: flex;
    flex-direction: column;
    padding: 20px 0;
    overflow: hidden;
    transition: width 0.2s ease, min-width 0.2s ease, padding 0.2s ease;
  }

  #sidebar.hidden { width: 0; min-width: 0; padding: 0; }

  .sidebar-logo {
    padding: 0 20px 24px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.02em;
    border-bottom: none;
    margin-bottom: 12px;
  }

  .sidebar-logo span { color: var(--text3); font-weight: 400; }

  .nav-item {
    padding: 9px 20px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text3);
    transition: color 0.15s;
    user-select: none;
  }

  .nav-item:hover { color: var(--text2); background: none; }
  .nav-item.active { color: var(--text); background: none; }

  /* TODO: model selector — disabled, re-enable when multi-model needed
  .model-select-wrap { padding: 0 16px; margin-bottom: 8px; }
  .model-select-wrap select { width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text2); font-size:11px; padding:5px 8px; border-radius:6px; cursor:pointer; outline:none; font-family:inherit; }
  .model-select-wrap select:focus { border-color: var(--accent); }
  */

  .db-toggle {
    padding: 0 20px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
  }
  .db-toggle-dot {
    width: 28px; height: 16px;
    border-radius: 8px;
    background: var(--text3);
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .db-toggle-dot::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #fff;
    top: 2px; left: 2px;
    transition: left 0.2s;
  }
  .db-toggle.on .db-toggle-dot { background: var(--accent); }
  .db-toggle.on .db-toggle-dot::after { left: 14px; }
  .db-toggle-label { font-size: 12px; color: var(--text3); }
  .db-toggle.on .db-toggle-label { color: var(--text2); }

  .sidebar-footer {
    padding: 8px 20px 16px;
    font-size: 11px;
    color: var(--text3);
  }

  /* ── Main ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ── Topbar ── */
  #topbar {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    border-bottom: none;
    gap: 12px;
    flex-shrink: 0;
  }

  #menu-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: #383838;
    font-size: 15px;
    padding: 2px 4px;
    line-height: 1;
    transition: color 0.15s;
  }

  #menu-btn:hover { color: var(--text3); }

  #topbar-title {
    font-size: 14px;
    color: var(--text3);
    flex: 1;
  }

  #status-badge {
    font-size: 11px;
    color: var(--text3);
  }

  #toks-display {
    font-size: 11px;
    color: var(--text3);
  }

  /* ── Panels ── */
  .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .panel.active { display: flex; }

  /* ── Chat panel ── */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
  }

  #chat-messages::-webkit-scrollbar { width: 4px; }
  #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 680px;
    margin: 0 auto 20px;
    padding: 0 24px;
    line-height: 1.65;
    font-size: 15px;
  }

  .msg.user { color: var(--text); }
  .msg.ai { color: var(--text); }

  .msg-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .msg.user .msg-label { color: var(--accent); }

  .msg-body { color: var(--text); }
  .msg.ai .msg-body { color: var(--text2); }

  .msg-divider {
    max-width: 680px;
    margin: 0 auto 20px;
    padding: 0 24px;
    border-top: 1px solid var(--border);
  }

  /* progress */
  #progress-wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 24px 16px;
    display: none;
  }

  #progress-bar-outer {
    width: 100%;
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-bar-inner {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 0.3s;
  }

  #progress-text {
    font-size: 11px;
    color: var(--text3);
    margin-top: 6px;
  }

  /* ── Chat input ── */
  #chat-input-wrap {
    padding: 16px 24px 20px;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
  }

  #input-box {
    display: flex;
    align-items: flex-end;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--bg3);
    padding: 10px 14px;
    gap: 8px;
  }

  #input-box:focus-within { border-color: #303030; }

  #user-input { background: transparent; }

  #user-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    resize: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 1.5;
  }

  #user-input::placeholder { color: var(--text3); }

  #send-btn {
    background: none;
    border: none;
    color: #c0c0c0;
    font-family: inherit;
    font-size: 13px;
    padding: 4px 8px;
    cursor: pointer;
    flex-shrink: 0;
    transition: color 0.15s;
  }

  #send-btn:hover { color: #e8e8e8; }
  #send-btn:disabled { color: var(--text3); opacity: 0.4; cursor: not-allowed; }

  /* ── Placeholder panels ── */
  .panel-placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text3);
    font-size: 14px;
  }

  .panel-placeholder strong {
    font-size: 16px;
    color: var(--text2);
    font-weight: 500;
  }

  /* ── Watermark ── */
  #watermark {
    position: fixed;
    right: 4px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 10px;
    color: var(--text3);
    opacity: 0.5;
    pointer-events: none;
    letter-spacing: 0.03em;
    writing-mode: vertical-rl;
  }

  #update-badge {
    display: none;
    font-size: 11px;
    color: #f0a500;
    border: 1px solid #f0a500;
    border-radius: 8px;
    padding: 1px 7px;
    cursor: pointer;
  }
  #update-badge:hover { background: rgba(240,165,0,0.1); }

  #ctx-badge {
    display: none;
    font-size: 11px;
    color: var(--text3);
    border-radius: 4px;
    padding: 1px 5px;
    cursor: default;
    transition: color 0.3s;
  }
  #ctx-badge.warn { color: #f0a500; }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    :root { --sidebar-w: 200px; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-logo">Memex <span>LLM</span></div>
  <div class="nav-item active" onclick="showPanel('chat')">Chat</div>
  <div class="nav-item" onclick="showPanel('search')">Search</div>
  <div class="nav-item" onclick="showPanel('entry')">Entry</div>
  <div class="nav-item" onclick="showPanel('database')">Database</div>
  <!-- TODO: model selector — disabled, re-enable when multi-model needed
  <div class="model-select-wrap">
    <select id="model-select" onchange="changeModel(this.value)">
      <option value="Qwen2.5-0.5B-Instruct-q4f32_1-MLC">Qwen2.5 0.5B (~500MB)</option>
      <option value="gemma-2-2b-it-q4f16_1-MLC" disabled>Gemma 2 2B — slow on mobile</option>
      <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC" disabled>Llama 3.2 1B — slow on mobile</option>
    </select>
  </div>
  -->
  <div class="db-toggle on" id="db-toggle" onclick="dbToggle()">
    <div class="db-toggle-dot"></div>
    <span class="db-toggle-label">DB</span>
  </div>
  <div class="sidebar-footer" id="model-footer">Loading...</div>
</div>

<!-- Main -->
<div id="main">

  <!-- Topbar -->
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()">&#9776;</button>
    <span id="topbar-title">Chat</span>
    <span id="update-badge" onclick="location.reload()">update ↻</span>
    <span id="ctx-badge" title="Context window full — oldest messages forgotten"></span>
    <span id="toks-display"></span>
    <span id="status-badge">initializing</span>
  </div>

  <!-- Chat panel -->
  <div class="panel active" id="panel-chat">
    <div id="chat-messages">
      <div id="progress-wrap">
        <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
        <div id="progress-text"></div>
      </div>
    </div>
    <div id="chat-input-wrap">
      <div id="input-box">
        <textarea id="user-input" placeholder="Ask anything..." rows="1" disabled
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
        <button id="send-btn" disabled onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <!-- Search panel -->
  <div class="panel" id="panel-search">
    <div class="panel-placeholder">
      <strong>Search</strong>
      <span>Search your database — coming soon</span>
    </div>
  </div>

  <!-- Entry panel -->
  <div class="panel" id="panel-entry">
    <div class="panel-placeholder">
      <strong>Entry</strong>
      <span>Save to your database — coming soon</span>
    </div>
  </div>

  <!-- Database panel -->
  <div class="panel" id="panel-database">
    <div class="panel-placeholder">
      <strong>Database</strong>
      <span>Browse your entries — coming soon</span>
    </div>
  </div>

</div>

<!-- Watermark -->
<div id="watermark">memexpaim-llm</div>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm@0.2.79";
import { dbInit, keres } from "./memex-db.js";

const MODELS = {
  "Qwen2.5-0.5B-Instruct-q4f32_1-MLC": "Qwen2.5 0.5B",
  // TODO: too slow on mobile A54/A56 (~4-5 tok/s) — re-enable when faster hardware
  // "gemma-2-2b-it-q4f16_1-MLC":         "Gemma 2 2B",
  // "Llama-3.2-1B-Instruct-q4f16_1-MLC": "Llama 3.2 1B",
};

const SYSTEM_PROMPT_BASE = `You are a concise personal AI assistant. Answer in maximum 3 sentences. Be direct.
If you don't know the answer, say exactly: "I don't have information about that."
Never guess or make up facts. /no_think`;

function buildSystemPrompt() {
  const now = new Date();
  const dateStr = now.toISOString().slice(0, 10);
  const hours = now.getHours();
  const h = String(hours).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const timeStr = h + ':' + m;
  const period = hours < 5 ? 'night' : hours < 12 ? 'morning' : hours < 17 ? 'afternoon' : hours < 21 ? 'evening' : 'night';
  return `Today is ${dateStr}, time is ${timeStr} (${period}).\n${SYSTEM_PROMPT_BASE}`;
}

let dbReady = false;
let dbOn = true;
dbInit().then(() => { dbReady = true; }).catch(() => {});

window.dbToggle = function() {
  dbOn = !dbOn;
  const el = document.getElementById('db-toggle');
  el.classList.toggle('on', dbOn);
};

const MAX_TOKENS = 4096;
const HISTORY_LIMIT = Math.floor(MAX_TOKENS * 0.75); // 75% = ~3072 token history-ra

let engine = null;
let busy = false;
let activeModel = '';
let history = []; // [{role, content, tokens}]

// Durva becslés: ~1 token = 4 karakter
function estTokens(text) { return Math.ceil(text.length / 4); }

const ctxBadge = document.getElementById('ctx-badge');

function trimHistory(reservedTokens) {
  const available = HISTORY_LIMIT - reservedTokens;
  let total = 0;
  const keep = [];
  for (let i = history.length - 1; i >= 0; i--) {
    total += history[i].tokens;
    if (total > available) break;
    keep.unshift(history[i]);
  }
  return keep;
}

function updateCtxBadge(systemPrompt) {
  if (history.length === 0) { ctxBadge.style.display = 'none'; return; }
  const sysT = estTokens(systemPrompt);
  const histT = history.reduce((s, h) => s + h.tokens, 0);
  const pct = Math.round(((sysT + histT) / MAX_TOKENS) * 100);
  ctxBadge.textContent = `ctx ${pct}%`;
  ctxBadge.style.display = 'inline';
  ctxBadge.classList.toggle('warn', pct >= 80);
  ctxBadge.title = pct >= 80
    ? `Context ${pct}% full — oldest messages are being dropped`
    : `Context window: ${pct}% used`;
}

const statusBadge  = document.getElementById('status-badge');
const toksDisplay  = document.getElementById('toks-display');
const progWrap     = document.getElementById('progress-wrap');
const progBar      = document.getElementById('progress-bar-inner');
const progText     = document.getElementById('progress-text');
const chatMessages = document.getElementById('chat-messages');
const input        = document.getElementById('user-input');
const sendBtn      = document.getElementById('send-btn');
const modelFooter  = document.getElementById('model-footer');

function setStatus(s) { statusBadge.textContent = s; }

function addMsg(text, type) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + type;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = type === 'user' ? 'You' : 'Memex';
  const body = document.createElement('div');
  body.className = 'msg-body';
  body.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(body);
  chatMessages.appendChild(wrap);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return body;
}

function addDivider() {
  const d = document.createElement('div');
  d.className = 'msg-divider';
  chatMessages.appendChild(d);
}

// auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = input.scrollHeight + 'px';
});

async function initModel(modelId) {
  if (!navigator.gpu) {
    setStatus('no webgpu');
    addMsg('WebGPU not supported. Please use Chrome 113+', 'ai');
    return;
  }

  progWrap.style.display = 'block';
  setStatus('loading...');
  progBar.style.width = '0%';
  progText.textContent = 'Loading ' + modelId + '...';

  try {
    engine = await webllm.CreateMLCEngine(modelId, {
      initProgressCallback: (p) => {
        const pct = Math.round((p.progress || 0) * 100);
        progBar.style.width = pct + '%';
        progText.textContent = p.text || ('Loading... ' + pct + '%');
      }
    });

    activeModel = modelId;
    progWrap.style.display = 'none';
    setStatus('ready');
    modelFooter.textContent = MODELS[modelId] || modelId.split('-Instruct')[0];
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();

  } catch (e) {
    progWrap.style.display = 'none';
    setStatus('error');
    addMsg('Failed to load: ' + e.message, 'ai');
  }
}

window.changeModel = async function(modelId) {
  engine = null;
  input.disabled = true;
  sendBtn.disabled = true;
  setStatus('switching...');
  await initModel(modelId);
};

window.sendMessage = async function() {
  const text = input.value.trim();
  if (!text || busy || !engine) return;

  busy = true;
  input.value = '';
  input.style.height = 'auto';
  input.disabled = true;
  sendBtn.disabled = true;
  setStatus('thinking...');
  toksDisplay.textContent = '';

  addMsg(text, 'user');
  const aiBody = addMsg('', 'ai');
  chatMessages.scrollTop = chatMessages.scrollHeight;

  try {
    // RAG: keresés az adatbázisban (csak ha DB toggle BE van kapcsolva)
    let systemPrompt = buildSystemPrompt();
    if (dbOn && dbReady) {
      const talalatok = await keres(text, 5);
      if (talalatok.length > 0) {
        systemPrompt += '\n\n=== YOUR MEMORY DATABASE ===\n';
        talalatok.forEach(r => {
          systemPrompt += `[${(r.idobelyeg||'').slice(0,10)}] ${r.tartalom.slice(0,200)}\n`;
        });
      }
    }

    // Sliding window: trim history to fit context
    const sysTokens = estTokens(systemPrompt);
    const trimmedHistory = trimHistory(sysTokens);

    const messages = [
      { role: 'system', content: systemPrompt },
      ...trimmedHistory.map(h => ({ role: h.role, content: h.content })),
      { role: 'user', content: text }
    ];

    const stream = await engine.chat.completions.create({
      messages,
      stream: true,
      temperature: 0.7,
      max_tokens: 128,
      frequency_penalty: 1.2
    });

    let response = '';
    let tokens = 0;
    const t0 = Date.now();

    for await (const chunk of stream) {
      const delta = chunk.choices[0]?.delta?.content || '';
      if (delta) tokens++;
      response += delta;
      aiBody.textContent = response;
      chatMessages.scrollTop = chatMessages.scrollHeight;
      const sec = (Date.now() - t0) / 1000;
      if (sec > 0) toksDisplay.textContent = Math.round(tokens / sec) + ' tok/s';
    }

    // Save exchange to history
    history.push({ role: 'user', content: text, tokens: estTokens(text) });
    history.push({ role: 'assistant', content: response, tokens: tokens || estTokens(response) });
    updateCtxBadge(buildSystemPrompt());

    const totalSec = ((Date.now() - t0) / 1000).toFixed(1);
    toksDisplay.textContent = Math.round(tokens / (totalSec || 1)) + ' tok/s · ' + totalSec + 's';
    addDivider();

  } catch (e) {
    aiBody.textContent = 'Error: ' + e.message;
  }

  busy = false;
  input.disabled = false;
  sendBtn.disabled = false;
  setStatus('ready');
  input.focus();
};

window.showPanel = function(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  event.target.classList.add('active');
  document.getElementById('topbar-title').textContent =
    name.charAt(0).toUpperCase() + name.slice(1);
  if (window.innerWidth <= 600) document.getElementById('sidebar').classList.add('hidden');
};

window.toggleSidebar = function() {
  document.getElementById('sidebar').classList.toggle('hidden');
};

initModel('Qwen2.5-0.5B-Instruct-q4f32_1-MLC');
</script>
</body>
</html>
