<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memex LLM</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a1a;
    --bg2: #1a1a1a;
    --bg3: #222222;
    --text: #e8e8e8;
    --text2: #888888;
    --text3: #505050;
    --border: #2a2a2a;
    --input-border: #272727;
    --accent: #4f8ef7;
    --sidebar-w: 220px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg2);
    border-right: none;
    display: flex;
    flex-direction: column;
    padding: 20px 0;
    overflow: hidden;
    transition: width 0.2s ease, min-width 0.2s ease, padding 0.2s ease;
  }

  #sidebar.hidden { width: 0; min-width: 0; padding: 0; }

  .sidebar-logo {
    padding: 0 20px 24px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.02em;
    border-bottom: none;
    margin-bottom: 12px;
  }

  .sidebar-logo span { color: var(--text3); font-weight: 400; }

  .nav-item {
    padding: 9px 20px;
    cursor: pointer;
    font-size: 14px;
    color: var(--text3);
    transition: color 0.15s;
    user-select: none;
  }

  .nav-item:hover { color: var(--text2); background: none; }
  .nav-item.active { color: var(--text); background: none; }

  .sidebar-footer {
    margin-top: auto;
    padding: 16px 20px;
    font-size: 11px;
    color: var(--text3);
  }

  /* ── Main ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ── Topbar ── */
  #topbar {
    display: flex;
    align-items: center;
    padding: 12px 20px;
    border-bottom: none;
    gap: 12px;
    flex-shrink: 0;
  }

  #menu-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 15px;
    padding: 2px 4px;
    line-height: 1;
    transition: color 0.15s;
  }

  #menu-btn:hover { color: var(--text2); }

  #topbar-title {
    font-size: 14px;
    color: var(--text2);
    flex: 1;
  }

  #status-badge {
    font-size: 11px;
    color: var(--text3);
  }

  #toks-display {
    font-size: 11px;
    color: var(--text3);
  }

  /* ── Panels ── */
  .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .panel.active { display: flex; }

  /* ── Chat panel ── */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
  }

  #chat-messages::-webkit-scrollbar { width: 4px; }
  #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 680px;
    margin: 0 auto 20px;
    padding: 0 24px;
    line-height: 1.65;
    font-size: 15px;
  }

  .msg.user { color: var(--text); }
  .msg.ai { color: var(--text); }

  .msg-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .msg.user .msg-label { color: var(--accent); }

  .msg-body { color: var(--text); }
  .msg.ai .msg-body { color: var(--text2); }

  .msg-divider {
    max-width: 680px;
    margin: 0 auto 20px;
    padding: 0 24px;
    border-top: 1px solid var(--border);
  }

  /* progress */
  #progress-wrap {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 24px 16px;
    display: none;
  }

  #progress-bar-outer {
    width: 100%;
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-bar-inner {
    height: 100%;
    width: 0%;
    background: var(--accent);
    transition: width 0.3s;
  }

  #progress-text {
    font-size: 11px;
    color: var(--text3);
    margin-top: 6px;
  }

  /* ── Chat input ── */
  #chat-input-wrap {
    padding: 16px 24px 20px;
    max-width: 680px;
    margin: 0 auto;
    width: 100%;
  }

  #input-box {
    display: flex;
    align-items: flex-end;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--bg3);
    padding: 10px 14px;
    gap: 8px;
  }

  #input-box:focus-within { border-color: #303030; }

  #user-input { background: transparent; }

  #user-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 15px;
    color: var(--text);
    resize: none;
    min-height: 24px;
    max-height: 120px;
    line-height: 1.5;
  }

  #user-input::placeholder { color: var(--text3); }

  #send-btn {
    background: none;
    border: none;
    color: var(--text3);
    font-family: inherit;
    font-size: 13px;
    padding: 4px 8px;
    cursor: pointer;
    flex-shrink: 0;
    transition: color 0.15s;
  }

  #send-btn:hover { color: var(--text); }
  #send-btn:disabled { color: var(--text3); opacity: 0.4; cursor: not-allowed; }

  /* ── Placeholder panels ── */
  .panel-placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--text3);
    font-size: 14px;
  }

  .panel-placeholder strong {
    font-size: 16px;
    color: var(--text2);
    font-weight: 500;
  }

  /* ── Watermark ── */
  #watermark {
    position: fixed;
    bottom: 10px;
    right: 14px;
    font-size: 10px;
    color: var(--text3);
    opacity: 0.5;
    pointer-events: none;
    letter-spacing: 0.03em;
  }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    :root { --sidebar-w: 200px; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-logo">Memex <span>LLM</span></div>
  <div class="nav-item active" onclick="showPanel('chat')">Chat</div>
  <div class="nav-item" onclick="showPanel('search')">Search</div>
  <div class="nav-item" onclick="showPanel('entry')">Entry</div>
  <div class="nav-item" onclick="showPanel('database')">Database</div>
  <div class="sidebar-footer" id="model-footer">Loading...</div>
</div>

<!-- Main -->
<div id="main">

  <!-- Topbar -->
  <div id="topbar">
    <button id="menu-btn" onclick="toggleSidebar()">&#9776;</button>
    <span id="topbar-title">Chat</span>
    <span id="toks-display"></span>
    <span id="status-badge">initializing</span>
  </div>

  <!-- Chat panel -->
  <div class="panel active" id="panel-chat">
    <div id="chat-messages">
      <div id="progress-wrap">
        <div id="progress-bar-outer"><div id="progress-bar-inner"></div></div>
        <div id="progress-text"></div>
      </div>
    </div>
    <div id="chat-input-wrap">
      <div id="input-box">
        <textarea id="user-input" placeholder="Ask anything..." rows="1" disabled
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
        <button id="send-btn" disabled onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <!-- Search panel -->
  <div class="panel" id="panel-search">
    <div class="panel-placeholder">
      <strong>Search</strong>
      <span>Search your database — coming soon</span>
    </div>
  </div>

  <!-- Entry panel -->
  <div class="panel" id="panel-entry">
    <div class="panel-placeholder">
      <strong>Entry</strong>
      <span>Save to your database — coming soon</span>
    </div>
  </div>

  <!-- Database panel -->
  <div class="panel" id="panel-database">
    <div class="panel-placeholder">
      <strong>Database</strong>
      <span>Browse your entries — coming soon</span>
    </div>
  </div>

</div>

<!-- Watermark -->
<div id="watermark">memexpaim-llm</div>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm@0.2.79";

const MODELS = [
  "SmolLM2-360M-Instruct-q4f16_1-MLC",
  "Qwen2.5-0.5B-Instruct-q4f32_1-MLC"
];

const SYSTEM_PROMPT = "You are a concise assistant. Answer in maximum 2-3 short sentences. Be direct. No unnecessary explanations. /no_think";

let engine = null;
let busy = false;
let activeModel = '';

const statusBadge  = document.getElementById('status-badge');
const toksDisplay  = document.getElementById('toks-display');
const progWrap     = document.getElementById('progress-wrap');
const progBar      = document.getElementById('progress-bar-inner');
const progText     = document.getElementById('progress-text');
const chatMessages = document.getElementById('chat-messages');
const input        = document.getElementById('user-input');
const sendBtn      = document.getElementById('send-btn');
const modelFooter  = document.getElementById('model-footer');

function setStatus(s) { statusBadge.textContent = s; }

function addMsg(text, type) {
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + type;
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = type === 'user' ? 'You' : 'Memex';
  const body = document.createElement('div');
  body.className = 'msg-body';
  body.textContent = text;
  wrap.appendChild(label);
  wrap.appendChild(body);
  chatMessages.appendChild(wrap);
  chatMessages.scrollTop = chatMessages.scrollHeight;
  return body;
}

function addDivider() {
  const d = document.createElement('div');
  d.className = 'msg-divider';
  chatMessages.appendChild(d);
}

// auto-resize textarea
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = input.scrollHeight + 'px';
});

async function initModel() {
  if (!navigator.gpu) {
    setStatus('no webgpu');
    addMsg('WebGPU not supported. Please use Chrome 113+', 'ai');
    return;
  }

  progWrap.style.display = 'block';
  setStatus('loading...');

  for (const modelId of MODELS) {
    progBar.style.width = '0%';
    progText.textContent = 'Loading ' + modelId + '...';

    try {
      engine = await webllm.CreateMLCEngine(modelId, {
        initProgressCallback: (p) => {
          const pct = Math.round((p.progress || 0) * 100);
          progBar.style.width = pct + '%';
          progText.textContent = p.text || ('Loading... ' + pct + '%');
        }
      });

      activeModel = modelId;
      const shortName = modelId.split('-Instruct')[0];
      progWrap.style.display = 'none';
      setStatus('ready');
      modelFooter.textContent = shortName;
      input.disabled = false;
      sendBtn.disabled = false;
      input.focus();
      return;

    } catch (e) {
      progText.textContent = 'Trying next model...';
    }
  }

  progWrap.style.display = 'none';
  setStatus('error');
  addMsg('Failed to load model. Check browser WebGPU support.', 'ai');
}

window.sendMessage = async function() {
  const text = input.value.trim();
  if (!text || busy || !engine) return;

  busy = true;
  input.value = '';
  input.style.height = 'auto';
  input.disabled = true;
  sendBtn.disabled = true;
  setStatus('thinking...');
  toksDisplay.textContent = '';

  addMsg(text, 'user');
  const aiBody = addMsg('', 'ai');
  chatMessages.scrollTop = chatMessages.scrollHeight;

  try {
    const stream = await engine.chat.completions.create({
      messages: [
        { role: 'system', content: SYSTEM_PROMPT },
        { role: 'user', content: text }
      ],
      stream: true,
      temperature: 0.7,
      max_tokens: 128,
      frequency_penalty: 1.2
    });

    let response = '';
    let tokens = 0;
    const t0 = Date.now();

    for await (const chunk of stream) {
      const delta = chunk.choices[0]?.delta?.content || '';
      if (delta) tokens++;
      response += delta;
      aiBody.textContent = response;
      chatMessages.scrollTop = chatMessages.scrollHeight;
      const sec = (Date.now() - t0) / 1000;
      if (sec > 0) toksDisplay.textContent = Math.round(tokens / sec) + ' tok/s';
    }

    const totalSec = ((Date.now() - t0) / 1000).toFixed(1);
    toksDisplay.textContent = Math.round(tokens / (totalSec || 1)) + ' tok/s · ' + totalSec + 's';
    addDivider();

  } catch (e) {
    aiBody.textContent = 'Error: ' + e.message;
  }

  busy = false;
  input.disabled = false;
  sendBtn.disabled = false;
  setStatus('ready');
  input.focus();
};

window.showPanel = function(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  event.target.classList.add('active');
  document.getElementById('topbar-title').textContent =
    name.charAt(0).toUpperCase() + name.slice(1);
  if (window.innerWidth <= 600) document.getElementById('sidebar').classList.add('hidden');
};

window.toggleSidebar = function() {
  document.getElementById('sidebar').classList.toggle('hidden');
};

initModel();
</script>
</body>
</html>
