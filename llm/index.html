<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memex LLM</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #00ff41;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #header {
    padding: 8px 12px;
    border-bottom: 1px solid #00ff4133;
    color: #00ff41;
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  #header .title { color: #00ff41; font-weight: bold; letter-spacing: 2px; }
  #header .status { color: #00ff4188; font-size: 10px; }

  #terminal {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }

  .line { line-height: 1.6; word-break: break-word; }
  .line.sys  { color: #00ff4166; font-size: 11px; }
  .line.user { color: #ffffff; }
  .line.user::before { content: '> '; color: #00ff41; }
  .line.ai   { color: #00ff41; }
  .line.ai::before { content: '» '; color: #00cc33; }
  .line.err  { color: #ff4444; }
  .line.info { color: #ffaa00; }

  #progress-wrap {
    padding: 4px 12px 8px;
    flex-shrink: 0;
    display: none;
  }

  #progress-bar-outer {
    width: 100%;
    height: 6px;
    background: #0f2f0f;
    border: 1px solid #00ff4133;
    border-radius: 3px;
    overflow: hidden;
  }

  #progress-bar-inner {
    height: 100%;
    width: 0%;
    background: #00ff41;
    transition: width 0.3s;
  }

  #progress-text {
    font-size: 10px;
    color: #00ff4188;
    margin-top: 3px;
    text-align: center;
  }

  #input-row {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-top: 1px solid #00ff4133;
    gap: 8px;
    flex-shrink: 0;
  }

  #prompt-sign { color: #00ff41; flex-shrink: 0; }

  #user-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #ffffff;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    caret-color: #00ff41;
  }

  #user-input::placeholder { color: #00ff4133; }

  #send-btn {
    background: none;
    border: 1px solid #00ff4144;
    color: #00ff41;
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    padding: 4px 10px;
    cursor: pointer;
    border-radius: 2px;
    flex-shrink: 0;
  }

  #send-btn:hover { background: #00ff4111; }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .cursor {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: #00ff41;
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 1px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  #terminal::-webkit-scrollbar { width: 4px; }
  #terminal::-webkit-scrollbar-track { background: #0a0a0a; }
  #terminal::-webkit-scrollbar-thumb { background: #00ff4133; border-radius: 2px; }
</style>
</head>
<body>

<div id="header">
  <span class="title">MEMEX LLM</span>
  <span class="status">
    <span id="status-text">INITIALIZING...</span>
    <span id="toks-display" style="margin-left:10px;color:#00ff4155;display:none;">0 tok/s</span>
  </span>
</div>

<div id="terminal"></div>

<div id="progress-wrap">
  <div id="progress-bar-outer">
    <div id="progress-bar-inner"></div>
  </div>
  <div id="progress-text">Loading model...</div>
</div>

<div id="input-row">
  <span id="prompt-sign">$</span>
  <input id="user-input" type="text" placeholder="type your question..." autocomplete="off" disabled>
  <button id="send-btn" disabled>SEND</button>
</div>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm@0.2.79";

const MODEL_ID = "SmolLM2-360M-Instruct-q4f16_1-MLC";
// /no_think disables Qwen3 chain-of-thought — answer comes instantly from DB context
const SYSTEM_PROMPT = "You are a concise assistant. Answer in maximum 2-3 short sentences. Be direct and clear. No unnecessary explanations. /no_think";

let engine = null;
let busy = false;

const terminal  = document.getElementById('terminal');
const input     = document.getElementById('user-input');
const sendBtn   = document.getElementById('send-btn');
const statusTxt = document.getElementById('status-text');
const progWrap  = document.getElementById('progress-wrap');
const progBar   = document.getElementById('progress-bar-inner');
const progTxt   = document.getElementById('progress-text');

function log(text, type = 'sys') {
  const div = document.createElement('div');
  div.className = `line ${type}`;
  div.textContent = text;
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
  return div;
}

function setStatus(text) { statusTxt.textContent = text; }

async function initModel() {
  log('MEMEX LLM v0.1 — SmolLM2-360M', 'sys');
  log('WebGPU accelerated · offline capable', 'sys');
  log('─────────────────────────────────────', 'sys');

  if (!navigator.gpu) {
    log('ERROR: WebGPU not supported. Use Chrome 113+', 'err');
    setStatus('WEBGPU NOT SUPPORTED');
    return;
  }

  log('WebGPU ✓', 'sys');
  log('Loading model: ' + MODEL_ID, 'info');
  log('First run: ~376MB download. Next runs: instant.', 'sys');

  progWrap.style.display = 'block';
  setStatus('LOADING MODEL...');

  try {
    engine = await webllm.CreateMLCEngine(MODEL_ID, {
      initProgressCallback: (progress) => {
        const pct = Math.round((progress.progress || 0) * 100);
        progBar.style.width = pct + '%';
        progTxt.textContent = progress.text || ('Loading... ' + pct + '%');
      }
    });

    progWrap.style.display = 'none';
    log('Model loaded ✓', 'sys');
    log('─────────────────────────────────────', 'sys');
    log('Ready. Type your question below.', 'info');
    setStatus('READY · ' + MODEL_ID);
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();

  } catch (e) {
    progWrap.style.display = 'none';
    log('ERROR: ' + e.message, 'err');
    setStatus('ERROR');
  }
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || busy || !engine) return;

  busy = true;
  input.value = '';
  input.disabled = true;
  sendBtn.disabled = true;
  setStatus('THINKING...');

  log(text, 'user');

  const aiLine = document.createElement('div');
  aiLine.className = 'line ai';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  aiLine.appendChild(cursor);
  terminal.appendChild(aiLine);
  terminal.scrollTop = terminal.scrollHeight;

  try {
    const stream = await engine.chat.completions.create({
      messages: [
        { role: 'system', content: SYSTEM_PROMPT },
        { role: 'user', content: text }
      ],
      stream: true,
      temperature: 0.7,
      max_tokens: 128
    });

    let response = '';
    let tokenCount = 0;
    const startTime = Date.now();
    const toksDisplay = document.getElementById('toks-display');
    toksDisplay.style.display = 'inline';

    for await (const chunk of stream) {
      const delta = chunk.choices[0]?.delta?.content || '';
      if (delta) tokenCount++;
      response += delta;
      aiLine.textContent = response;
      aiLine.appendChild(cursor);
      terminal.scrollTop = terminal.scrollHeight;
      const elapsed = (Date.now() - startTime) / 1000;
      if (elapsed > 0) toksDisplay.textContent = Math.round(tokenCount / elapsed) + ' tok/s';
    }
    cursor.remove();
    const totalSec = ((Date.now() - startTime) / 1000).toFixed(1);
    toksDisplay.textContent = Math.round(tokenCount / (totalSec || 1)) + ' tok/s · ' + totalSec + 's';
    log('─────────────────────────────────────', 'sys');

  } catch (e) {
    cursor.remove();
    log('ERROR: ' + e.message, 'err');
  }

  busy = false;
  input.disabled = false;
  sendBtn.disabled = false;
  setStatus('READY · ' + MODEL_ID);
  input.focus();
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

initModel();
</script>
</body>
</html>
